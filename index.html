<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HattyHats – Digital Universe (Prototype)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #02030a;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        sans-serif;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }

    #universe-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    /* Simple HUD text */
    .hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      font-size: 12px;
      line-height: 1.5;
      pointer-events: none;
      backdrop-filter: blur(6px);
    }

    .hud-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #ffffff;
    }

    .hud-body {
      color: #b0b7ff;
    }

    .hud-body strong {
      color: #ffffff;
      font-weight: 600;
    }

    /* Main Site button */
    .main-site-button {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.8);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      pointer-events: auto;
      box-shadow: 0 0 0 1px rgba(15, 23, 42, 0.9);
      transition: background 0.15s ease, transform 0.1s ease,
        box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .main-site-button:hover {
      background: rgba(37, 99, 235, 0.95);
      border-color: rgba(129, 140, 248, 1);
      box-shadow: 0 0 18px rgba(59, 130, 246, 0.8);
      transform: translateY(-1px);
    }

    .main-site-button:active {
      transform: translateY(0);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.6);
    }
  </style>
</head>
<body>
  <div id="universe-container">
    <div class="hud">
      <div class="hud-title">HattyHats – Digital Universe v0.3</div>
      <div class="hud-body">
        Click inside, then use:
        <br />
        <strong>W / S</strong> – forward / back
        <br />
        <strong>A / D</strong> – left / right
        <br />
        Drag mouse – look around
        <br /><br />
        <strong>1–4</strong> – jump to a world:
        <br />
        1: Learn With Hatty
        <br />
        2: Hatty Tools
        <br />
        3: Learn Cardano
        <br />
        4: Privacy Gadgets
        <br /><br />
        Hover a planet to see its name, click to open its world.
      </div>
    </div>

    <!-- Main site button -->
    <button
      class="main-site-button"
      onclick="window.open('https://earnwithhatty.com/', '_blank')"
    >
      Main Site
    </button>

    <!-- Tooltip that follows the mouse on hover -->
    <div id="hover-tooltip"
         style="
           position: absolute;
           padding: 4px 8px;
           border-radius: 4px;
           background: rgba(15, 23, 42, 0.92);
           color: #e5e7eb;
           font-size: 11px;
           border: 1px solid rgba(148, 163, 184, 0.7);
           pointer-events: none;
           transform: translate(-50%, -120%);
           white-space: nowrap;
           opacity: 0;
           transition: opacity 0.1s ease-out;
         ">
    </div>
  </div>

  <!-- Three.js from CDN (module build) -->
  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const container = document.getElementById("universe-container");
    const tooltip = document.getElementById("hover-tooltip");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x02030a);

    // Camera
    const camera = new THREE.PerspectiveCamera(
      75,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.set(0, 0, 50);

    // Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    container.appendChild(renderer.domElement);

    // Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35);
    scene.add(ambientLight);

    const mainLight = new THREE.PointLight(0xffffff, 1.4, 0, 2);
    mainLight.position.set(0, 0, 0);
    scene.add(mainLight);

    // Starfield
    function createStarfield() {
      const starCount = 2000;
      const geometry = new THREE.BufferGeometry();
      const positions = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount; i++) {
        const i3 = i * 3;
        positions[i3 + 0] = (Math.random() - 0.5) * 2000;
        positions[i3 + 1] = (Math.random() - 0.5) * 2000;
        positions[i3 + 2] = (Math.random() - 0.5) * 2000;
      }

      geometry.setAttribute(
        "position",
        new THREE.BufferAttribute(positions, 3)
      );

      const material = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 1.1,
        sizeAttenuation: true,
      });

      const stars = new THREE.Points(geometry, material);
      scene.add(stars);
    }

    createStarfield();

    const textureLoader = new THREE.TextureLoader();

    // Planets + label + URL + texture data
    function createPlanet(radius, color, position, label, url, textureUrl) {
      const geometry = new THREE.SphereGeometry(radius, 48, 48);

      const material = new THREE.MeshStandardMaterial({
        color,
        roughness: 0.6,
        metalness: 0.2,
      });

      if (textureUrl) {
        textureLoader.load(
          textureUrl,
          (tex) => {
            tex.wrapS = THREE.RepeatWrapping;
            tex.wrapT = THREE.RepeatWrapping;
            material.map = tex;
            material.needsUpdate = true;
          },
          undefined,
          () => {
            // if texture fails, you still get a colored planet
          }
        );
      }

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.copy(position);
      mesh.userData.label = label;
      mesh.userData.radius = radius;
      mesh.userData.url = url;
      scene.add(mesh);
      return mesh;
    }

    const planets = [];
    planets.push(
      createPlanet(
        8,
        0xffffff,
        new THREE.Vector3(40, 0, -30),
        "Learn With Hatty",
        "https://earnwithhatty.com/",
        "https://i.ibb.co/LhB2ncPR/Learn-with-hatty-2-1.png"
      )
    );
    planets.push(
      createPlanet(
        5,
        0xffffff,
        new THREE.Vector3(-60, 10, -80),
        "Hatty Tools",
        "https://earn-with-hatty-tools.netlify.app/",
        "https://i.ibb.co/9kWjbb8f/grok-image-f2f24317-2ad0-42f9-8a67-53cfeaec08ca.jpg"
      )
    );
    planets.push(
      createPlanet(
        10,
        0xffffff,
        new THREE.Vector3(0, -30, -120),
        "Learn Cardano",
        "https://learn-cardano.netlify.app/",
        "https://i.ibb.co/LzgZj25F/cardano-ada-logo.png"
      )
    );
    planets.push(
      createPlanet(
        3,
        0xffffff,
        new THREE.Vector3(70, 40, -150),
        "Privacy Gadgets",
        "https://privacy-gadgets-hub.netlify.app/",
        "https://i.ibb.co/XZRJ7FJ6/45bb8258-7d85-4d3a-b149-abdcc157035a.jpg"
      )
    );

    // New Cardano Planet (official site)
    planets.push(
      createPlanet(
        9,
        0xffffff,
        new THREE.Vector3(-90, -40, -180),
        "Cardano Planet",
        "https://cardano.org/",
        "https://i.ibb.co/sv8X6ksV/Screenshot-2026-03-04-112403.png"
      )
    );

    // New Voi Planet (Voi blockchain)
    planets.push(
      createPlanet(
        7,
        0xffffff,
        new THREE.Vector3(110, 20, -210),
        "Voi Planet",
        "https://voi.network/",
        "https://i.ibb.co/vCQSwR8R/Screenshot-2026-03-04-112456.png"
      )
    );

    // Hatty's News
    planets.push(
      createPlanet(
        6,
        0xffffff,
        new THREE.Vector3(-30, 60, -170),
        "Hatty's News",
        "https://hattyhats.github.io/hattys-news/",
        "img/hattys-news.jpeg"
      )
    );

    // Hatty's Media
    planets.push(
      createPlanet(
        7,
        0xffffff,
        new THREE.Vector3(85, -60, -100),
        "Hatty's Media",
        "https://hattys-media.netlify.app/",
        "img/hattys-media.png"
      )
    );


    // --- Simple WASD + mouse-look controls ---

    const keys = {
      KeyW: false,
      KeyA: false,
      KeyS: false,
      KeyD: false,
      Digit1: false,
      Digit2: false,
      Digit3: false,
      Digit4: false,
    };

    let isMouseDown = false;
    let previousMouseX = 0;
    let previousMouseY = 0;

    let yaw = 0;
    let pitch = 0;

    const moveSpeed = 40;
    const lookSpeed = 0.0025;

    window.addEventListener("keydown", (event) => {
      if (event.code in keys) {
        keys[event.code] = true;
      }
    });

    window.addEventListener("keyup", (event) => {
      if (event.code in keys) {
        keys[event.code] = false;
      }
    });

    renderer.domElement.addEventListener("mousedown", (event) => {
      isMouseDown = true;
      previousMouseX = event.clientX;
      previousMouseY = event.clientY;
    });

    window.addEventListener("mouseup", () => {
      isMouseDown = false;
    });

    window.addEventListener("mousemove", (event) => {
      if (!isMouseDown) return;

      const deltaX = event.clientX - previousMouseX;
      const deltaY = event.clientY - previousMouseY;
      previousMouseX = event.clientX;
      previousMouseY = event.clientY;

      yaw -= deltaX * lookSpeed;
      pitch -= deltaY * lookSpeed;

      const maxPitch = Math.PI / 2 - 0.1;
      pitch = Math.max(-maxPitch, Math.min(maxPitch, pitch));
    });

    function updateCameraRotation() {
      const quat = new THREE.Quaternion();
      quat.setFromEuler(new THREE.Euler(pitch, yaw, 0, "YXZ"));
      camera.quaternion.copy(quat);
    }

    function updateCameraPosition(delta) {
      const direction = new THREE.Vector3();

      if (keys.KeyW) direction.z -= 1;
      if (keys.KeyS) direction.z += 1;
      if (keys.KeyA) direction.x -= 1;
      if (keys.KeyD) direction.x += 1;

      if (direction.lengthSq() > 0) {
        direction.normalize();
        direction.applyQuaternion(camera.quaternion);
        direction.multiplyScalar(moveSpeed * delta);
        camera.position.add(direction);
      }
    }

    // --- Snap-to-planet shortcuts (1–4) ---

    function moveCameraNearPlanet(planet) {
      const offsetDistance = planet.userData.radius * 4;
      const direction = new THREE.Vector3()
        .subVectors(camera.position, planet.position)
        .normalize();

      if (direction.lengthSq() === 0) {
        direction.set(0, 0, 1);
      }

      const targetPosition = new THREE.Vector3()
        .copy(planet.position)
        .add(direction.multiplyScalar(offsetDistance));

      camera.position.copy(targetPosition);
      camera.lookAt(planet.position);

      const v = new THREE.Vector3()
        .subVectors(planet.position, camera.position)
        .normalize();
      yaw = Math.atan2(v.x, v.z * -1);
      pitch = Math.asin(v.y);
    }

    function handlePlanetShortcuts() {
      if (keys.Digit1) moveCameraNearPlanet(planets[0]);
      if (keys.Digit2) moveCameraNearPlanet(planets[1]);
      if (keys.Digit3) moveCameraNearPlanet(planets[2]);
      if (keys.Digit4) moveCameraNearPlanet(planets[3]);
    }

    // --- Hover + click detection (raycaster + tooltip) ---

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();

    let hoveredPlanet = null;
    let lastMouseEvent = null;

    function updateMouseFromEvent(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      const x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      const y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      mouse.set(x, y);
      lastMouseEvent = event;
    }

    function updateTooltipPosition(event) {
      if (!event || !hoveredPlanet) return;
      const x = event.clientX;
      const y = event.clientY;
      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y}px`;
    }

    function handleHover() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets, false);

      if (intersects.length > 0) {
        const planet = intersects[0].object;

        if (hoveredPlanet !== planet) {
          if (hoveredPlanet && hoveredPlanet.userData.originalColor) {
            hoveredPlanet.material.color.copy(
              hoveredPlanet.userData.originalColor
            );
          }

          hoveredPlanet = planet;

          if (!planet.userData.originalColor) {
            planet.userData.originalColor = planet.material.color.clone();
          }
          const highlightColor = planet.userData.originalColor
            .clone()
            .multiplyScalar(1.4);
          planet.material.color.copy(highlightColor);

          container.style.cursor = "pointer";

          tooltip.textContent = planet.userData.label || "";
          tooltip.style.opacity = "1";
        }
      } else {
        if (hoveredPlanet && hoveredPlanet.userData.originalColor) {
          hoveredPlanet.material.color.copy(
            hoveredPlanet.userData.originalColor
          );
        }
        hoveredPlanet = null;
        container.style.cursor = "default";
        tooltip.style.opacity = "0";
      }

      if (lastMouseEvent) {
        updateTooltipPosition(lastMouseEvent);
      }
    }

    function onMouseMove(event) {
      updateMouseFromEvent(event);
      updateTooltipPosition(event);
      handleHover();
    }

    function onClick(event) {
      updateMouseFromEvent(event);
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObjects(planets, false);

      if (intersects.length > 0) {
        const planet = intersects[0].object;
        const url = planet.userData.url;
        if (url) {
          window.open(url, "_blank");
        }
      }
    }

    renderer.domElement.addEventListener("mousemove", onMouseMove);
    renderer.domElement.addEventListener("click", onClick);

    // Handle resize
    window.addEventListener("resize", () => {
      const width = window.innerWidth;
      const height = window.innerHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    });

    // Animation loop
    const clock = new THREE.Clock();

    function animate() {
      const delta = clock.getDelta();

      planets.forEach((planet, index) => {
        planet.rotation.y += 0.12 * delta * (index + 1);
      });

      handlePlanetShortcuts();
      updateCameraRotation();
      updateCameraPosition(delta);

      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
